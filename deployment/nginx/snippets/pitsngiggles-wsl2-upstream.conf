# Upstreams for Pits n' Giggles (port 4768) and engineer_voice (port 11734).
# Default: same machine (127.0.0.1). On WSL2, run apply-wsl2-nginx-upstreams.sh so
# these point at the Windows host (default route gateway from inside WSL).
#
upstream wsl2_png_4768 {
    server 127.0.0.1:4768;
}
upstream wsl2_voice_11734 {
    server 127.0.0.1:11734;
}
