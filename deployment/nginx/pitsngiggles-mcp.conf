# Pits n' Giggles MCP Reverse Proxy Configuration
# This proxies the local MCP server to HTTPS
#
# Local dev:  localhost, mcp.local  (certs in /etc/nginx/ssl/pitsngiggles/)
# LAN FQDN:   f1-race-engineer.netintegrate.net  (certs in /etc/nginx/ssl/f1-race-engineer.netintegrate.net/)

# HTTP -> HTTPS redirect (local names)
server {
    listen 80;
    server_name localhost mcp.local;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# HTTP -> HTTPS redirect (A record to this host — Strategy Center + MCP SNI)
server {
    listen 80;
    server_name f1-race-engineer.netintegrate.net;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# Main HTTPS server
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name localhost mcp.local;

    # SSL certificates (self-signed for local development)
    ssl_certificate     /etc/nginx/ssl/pitsngiggles/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pitsngiggles/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Access-Control-Allow-Origin "*" always;

    # Standalone LAN race engineer (voice app on 11734) — /race-engineer/ prefix matches static/lan_engineer.html
    location = /race-engineer {
        return 301 /race-engineer/;
    }
    location /race-engineer/ {
        proxy_pass http://127.0.0.1:11734/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Main dashboard (PNG HTTP); in-app /race-engineer/ on 4768 is not used when the path is proxied to 11734 above
    location / {
        proxy_pass http://127.0.0.1:4768/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MCP (Model Context Protocol) for AI tools — canonical path
    location /f1-race-engineer-lan {
        proxy_pass http://127.0.0.1:4768/f1-race-engineer-lan;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # Server-Sent Events (SSE) configuration
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;

        # CORS for external AI tools
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Legacy short path (kept for existing client configs)
    location /mcp {
        proxy_pass http://127.0.0.1:4768/mcp;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Static assets
    location /static/ {
        proxy_pass http://127.0.0.1:4768/static/;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:4768/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Socket.IO endpoint
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4768/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/pitsngiggles-mcp.access.log;
    error_log  /var/log/nginx/pitsngiggles-mcp.error.log;
}

