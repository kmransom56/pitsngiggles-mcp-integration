# Pits n' Giggles MCP Reverse Proxy Configuration
# This proxies the local MCP server to HTTPS

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name localhost mcp.local;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# Main HTTPS server
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name localhost mcp.local;

    # SSL certificates (self-signed for local development)
    ssl_certificate     /etc/nginx/ssl/pitsngiggles/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pitsngiggles/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Access-Control-Allow-Origin "*" always;

    # Main dashboard (includes /race-engineer/ when mounted in the PNG HTTP server)
    location / {
        proxy_pass http://127.0.0.1:4768/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MCP endpoint for AI tools (ChatGPT, Cursor, Claude, etc.)
    location /mcp {
        proxy_pass http://127.0.0.1:4768/mcp;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # Server-Sent Events (SSE) configuration
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;

        # CORS for external AI tools
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Static assets
    location /static/ {
        proxy_pass http://127.0.0.1:4768/static/;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:4768/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Socket.IO endpoint
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4768/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/pitsngiggles-mcp.access.log;
    error_log  /var/log/nginx/pitsngiggles-mcp.error.log;
}
