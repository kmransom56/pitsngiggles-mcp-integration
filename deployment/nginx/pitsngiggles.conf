server {
    listen 80;
    server_name localhost;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name localhost;

    # SSL Configuration
    ssl_certificate     /etc/nginx/ssl/pitsngiggles/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pitsngiggles/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Root - Driver View
    location / {
        proxy_pass http://localhost:4768/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Engineer View
    location /eng-view {
        proxy_pass http://localhost:4768/eng-view;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # AI Strategy Center
    location /strategy-center {
        proxy_pass http://localhost:4768/strategy-center;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static Assets
    location /static/ {
        proxy_pass http://localhost:4768/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API Endpoints
    location /api/ {
        proxy_pass http://localhost:4768/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telemetry Data Endpoints
    location /telemetry-info {
        proxy_pass http://localhost:4768/telemetry-info;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /race-info {
        proxy_pass http://localhost:4768/race-info;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /driver-info {
        proxy_pass http://localhost:4768/driver-info;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /stream-overlay-info {
        proxy_pass http://localhost:4768/stream-overlay-info;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # MCP Server-Sent Events Endpoint
    location /mcp {
        proxy_pass http://localhost:4768/mcp;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE-specific settings
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;

        # CORS headers for MCP clients
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
        add_header Cache-Control "no-cache" always;
        add_header X-Accel-Buffering "no" always;
    }

    # MCP Tools POST Endpoint
    location /mcp/tools {
        proxy_pass http://localhost:4768/mcp/tools;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS headers for MCP clients
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # WebSocket Proxy for Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:4768/socket.io/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/pitsngiggles.access.log;
    error_log  /var/log/nginx/pitsngiggles.error.log;
}
