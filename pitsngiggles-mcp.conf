server {
    listen 80;
    server_name mcp.netintegrate.net;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name mcp.netintegrate.net;

    ssl_certificate     /etc/nginx/ssl/mcp.netintegrate.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mcp.netintegrate.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Dashboard at root
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Telemetry Engineering View (proxied to Windows app)
    location /telemetry/ {
        proxy_pass http://172.22.112.1:4768/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Support for WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy Socket.IO traffic directly (handshake at root /socket.io/)
    location /socket.io/ {
        proxy_pass http://172.22.112.1:4768/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Map other relative assets if app requires them correctly
    location /static/ { proxy_pass http://172.22.112.1:4768/static/; }
    location /api/ { proxy_pass http://172.22.112.1:4768/api/; }

    # MCP endpoint
    location /mcp {
        proxy_pass http://172.22.112.1:4768/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    access_log /var/log/nginx/pitsngiggles-mcp.access.log;
    error_log  /var/log/nginx/pitsngiggles-mcp.error.log;
}
