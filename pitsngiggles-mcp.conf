# DNS: zone netintegrate.net is authoritative on your LAN resolvers (e.g. 192.168.0.252 / 192.168.0.253).
#       A record f1-race-engineer.netintegrate.net -> LAN IPv4 of this Nginx host. TLS files below must exist on disk.
# WSL2 upstream: replace 172.22.112.1 with `ip route show | grep default` gateway, or 127.0.0.1 if PNG runs on this Linux host.

server {
    listen 80;
    server_name f1-race-engineer.netintegrate.net mcp.netintegrate.net;

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8443 ssl; # IPv4 only for now; add listen [::]:8443 ssl; when you publish AAAA
    server_name f1-race-engineer.netintegrate.net mcp.netintegrate.net;

    ssl_certificate     /etc/nginx/ssl/f1-race-engineer.netintegrate.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/f1-race-engineer.netintegrate.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    # Prefer server cipher order for TLS 1.2 so Windows (Schannel) often negotiates AES-GCM before ChaCha
    ssl_prefer_server_ciphers on;
    ssl_session_tickets off;

    # Dashboard at root
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Telemetry Engineering View (proxied to Windows app)
    location /telemetry/ {
        proxy_pass http://172.22.112.1:4768/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Support for WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy Socket.IO traffic directly (handshake at root /socket.io/)
    location /socket.io/ {
        proxy_pass http://172.22.112.1:4768/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Map other relative assets if app requires them correctly
    location /static/ { proxy_pass http://172.22.112.1:4768/static/; }
    location /api/ { proxy_pass http://172.22.112.1:4768/api/; }

    # MCP (SSE) — canonical path for AI clients
    location /f1-race-engineer-lan {
        proxy_pass http://172.22.112.1:4768/f1-race-engineer-lan;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Legacy MCP path (existing configs)
    location /mcp {
        proxy_pass http://172.22.112.1:4768/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    access_log /var/log/nginx/pitsngiggles-mcp.access.log;
    error_log  /var/log/nginx/pitsngiggles-mcp.error.log;
}
